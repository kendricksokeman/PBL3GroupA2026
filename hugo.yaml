  dateformat: "20 April, 2026"
  #favicon: "apple-touch-icon.png"
  feedlinks: true
  footer: "Made by Ken Sunamoto - 2600250451-0"
  #icon: "apple-touch-icon.png"
  #image: "apple-touch-icon.png"
  imageMaxWidth: 400
  logoWidth: 64
  mobileMenu: true
  poweredby: true
  sidebar: true
  submitted: true
  themeColor: #121212
  author:
    name: "Ken Sunamoto"
    url: "https://example.org/somepage"
    avatar: "path/to/some-image.jpg"

